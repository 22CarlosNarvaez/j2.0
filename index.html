<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jueguito pal bebé💖</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:#ffb6c1;
  font-family:Arial;
  touch-action:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}
canvas { display:block; }

#hud { position:absolute; top:10px; left:10px; color:white; font-size:18px; text-shadow:1px 1px 3px black; }

#message {
  position:absolute; top:80px; width:100%; text-align:center;
  font-size:24px; color:white; text-shadow:2px 2px 5px black;
  opacity:0; transition:opacity 0.5s;
}

#gameOver {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:white; font-size:28px; text-align:center; display:none;
}

button { padding:10px 20px; border:none; border-radius:8px; }

#joystick {
  position:absolute; bottom:30px; left:30px;
  width:100px; height:100px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
}

#stick {
  width:40px; height:40px;
  background:white; border-radius:50%;
  position:absolute; top:30px; left:30px;
}

#shootBtn {
  position:absolute; bottom:40px; right:40px;
  width:70px; height:70px;
  background:red; border-radius:50%;
  color:white; font-size:20px;
}
</style>
</head>
<body>

<div id="hud">Puntos: 0 | ❤️ Vidas: 3</div>
<div id="message"></div>

<div id="gameOver">
  <div>💔 Game Over</div>
  <div id="finalScore"></div>
  <button id="restartBtn">Reintentar</button>
</div>

<div id="joystick"><div id="stick"></div></div>
<button id="shootBtn">💘</button>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// evitar zoom en iOS completamente
window.addEventListener('gesturestart', e => e.preventDefault());
window.addEventListener('dblclick', e => e.preventDefault());
// evitar zoom sin bloquear botones
window.addEventListener('gesturestart', e => e.preventDefault());
window.addEventListener('dblclick', e => e.preventDefault());
// evitar zoom sin romper el juego
window.addEventListener('gesturestart', e => e.preventDefault());
window.addEventListener('dblclick', e => e.preventDefault());

let score=0, lives=3, bullets=[], enemies=[], isGameOver=false;
let speedMultiplier = 1;

const messages=[
"Eres increíble ❤️",
"Estas pendeja la vdd pero te amo",
"Eres lo mejor que me ha pasado 💕",
"La verdad estas bien hermosa<3",
"Pvta si pierdes ahora",
"Llegaste re lejos, te amoooo",
"Aún acá, no pense que lo jugarias tanto"
];

const player={ x:canvas.width/2, y:canvas.height-100 };

const faceImg=new Image();
faceImg.src="img/ella.png";

function drawHeart(x,y,size,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size/2,x-size,y-size/2,x-size,y);
  ctx.bezierCurveTo(x-size,y+size/2,x,y+size,x,y+size);
  ctx.bezierCurveTo(x,y+size,x+size,y+size/2,x+size,y);
  ctx.bezierCurveTo(x+size,y-size/2,x,y-size/2,x,y);
  ctx.fill();
}

function drawCircleImage(img,x,y,size){
  ctx.save();
  ctx.beginPath();
  ctx.arc(x+size/2,y+size/2,size/2,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(img,x,y,size,size);
  ctx.restore();
}

function showMessage(){
  const msg=messages[Math.floor(Math.random()*messages.length)];
  const el=document.getElementById("message");
  el.innerText=msg; el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,2000);
}

function shoot(e){ if(e) e.preventDefault(); if(!isGameOver) bullets.push({x:player.x,y:player.y}); }

document.getElementById("shootBtn").addEventListener("touchstart",shoot,{passive:false});

function spawnEnemy(){
  if(isGameOver) return;
  enemies.push({
    x:Math.random()*(canvas.width-70),
    y:-70,
    size:80,
    speed:(2+Math.random()*2)*speedMultiplier
  });
}
setInterval(spawnEnemy,1200);

function updateHUD(){
  document.getElementById("hud").innerText=`Puntos: ${score} | ❤️ Vidas: ${lives}`;
}

function loseLife(){
  lives--; updateHUD();

// botón reiniciar compatible con celular
document.getElementById("restartBtn").addEventListener("click", restartGame);
document.getElementById("restartBtn").addEventListener("touchstart", (e)=>{
  e.preventDefault();
  restartGame();
}, {passive:false});
  if(lives<=0){
    isGameOver=true;
    document.getElementById("gameOver").style.display="block";
    document.getElementById("finalScore").innerText=`Puntuación: ${score}`;
  }
}

function update(){
  if(isGameOver) return;

  bullets.forEach((b,i)=>{ b.y-=8; if(b.y<0) bullets.splice(i,1); });

  enemies.forEach((e,i)=>{
    e.y+=e.speed;

    bullets.forEach((b,bi)=>{
      if(b.x<e.x+e.size && b.x>e.x && b.y<e.y+e.size && b.y>e.y){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        score++;
        updateHUD();

        if(score%10===0) showMessage();
        if(score%15===0) speedMultiplier+=0.3;
      }
    });

    if(e.y>canvas.height){ enemies.splice(i,1); loseLife(); }

    if(player.x<e.x+e.size && player.x>e.x && player.y<e.y+e.size && player.y>e.y){
      enemies.splice(i,1); loseLife();
    }
  });

  // limitar jugador dentro de la pantalla (iPhone incluido)
  const margin = 35; // margen ajustado al tamaño del corazón en iPhone
  if(player.x < margin) player.x = margin;
  if(player.x > canvas.width - margin) player.x = canvas.width - margin;
});

  enemies.forEach((e,i)=>{
    e.y+=e.speed;

    bullets.forEach((b,bi)=>{
      if(b.x<e.x+e.size && b.x>e.x && b.y<e.y+e.size && b.y>e.y){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        score++;
        updateHUD();

        if(score%10===0) showMessage();
        if(score%15===0) speedMultiplier+=0.3;
      }
    });

    if(e.y>canvas.height){ enemies.splice(i,1); loseLife(); }

    if(player.x<e.x+e.size && player.x>e.x && player.y<e.y+e.size && player.y>e.y){
      enemies.splice(i,1); loseLife();
    }
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // corazón mucho más grande (casi como enemigos)
  drawHeart(player.x,player.y,30,"red");

  bullets.forEach(b=>drawHeart(b.x,b.y,14,"red"));

  enemies.forEach(e=>drawCircleImage(faceImg,e.x,e.y,e.size));
}

function gameLoop(){ update(); draw(); requestAnimationFrame(gameLoop); }

gameLoop();

function restartGame(){
  score=0; lives=3; bullets=[]; enemies=[]; isGameOver=false; speedMultiplier=1;
  document.getElementById("gameOver").style.display="none";
  updateHUD();
}

const stick=document.getElementById("stick");
const joystick=document.getElementById("joystick");

joystick.addEventListener("touchmove",(e)=>{
  e.preventDefault();
  const rect=joystick.getBoundingClientRect();
  const touch=e.touches[0];
  let x=touch.clientX-rect.left-50;
  let max=40;
  x=Math.max(-max,Math.min(max,x));
  stick.style.left=(x+30)+"px";
  player.x+=x*0.2;
},{passive:false});

joystick.addEventListener("touchend",()=>{
  stick.style.left="30px";
});

updateHUD();
</script>

</body>
</html>
