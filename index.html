<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juego pal bebé 💖</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#ffb6c1;
  font-family:Arial;
  -webkit-user-select:none;
}

canvas {
  display:block;
  touch-action:none; /* 🔥 evita zoom SOLO en el juego */
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
  text-shadow:1px 1px 3px black;
}

#message {
  position:absolute;
  top:80px;
  width:100%;
  text-align:center;
  font-size:24px;
  color:white;
  opacity:0;
  transition:0.5s;
}

#gameOver {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
  display:none;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:8px;
}

#joystick {
  position:absolute;
  bottom:30px;
  left:30px;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
}

#stick {
  width:40px;
  height:40px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:30px;
  left:30px;
}

#shootBtn {
  position:absolute;
  bottom:40px;
  right:40px;
  width:70px;
  height:70px;
  background:red;
  border-radius:50%;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="hud">Puntos: 0 | ❤️ Vidas: 3</div>
<div id="message"></div>

<div id="gameOver">
  <div>💔 Game Over</div>
  <div id="finalScore"></div>
  <button id="restartBtn">Reintentar</button>
</div>

<div id="joystick"><div id="stick"></div></div>
<button id="shootBtn">💘</button>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// 🔥 bloqueo de zoom correcto
canvas.style.touchAction = "none";

let score=0, lives=3, bullets=[], enemies=[], isGameOver=false;
let speedMultiplier=1;

const player={ x:canvas.width/2, y:canvas.height-100 };

const faceImg=new Image();
faceImg.src="img/ella.png";

// ❤️ corazón
function drawHeart(x,y,size){
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size/2,x-size,y-size/2,x-size,y);
  ctx.bezierCurveTo(x-size,y+size/2,x,y+size,x,y+size);
  ctx.bezierCurveTo(x,y+size,x+size,y+size/2,x+size,y);
  ctx.bezierCurveTo(x+size,y-size/2,x,y-size/2,x,y);
  ctx.fill();
}

// 🔵 imagen circular
function drawCircleImage(img,x,y,size){
  ctx.save();
  ctx.beginPath();
  ctx.arc(x+size/2,y+size/2,size/2,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(img,x,y,size,size);
  ctx.restore();
}

// 🔫 disparo universal (touch + mouse + stylus)
function shoot(){
  if(!isGameOver){
    bullets.push({x:player.x,y:player.y});
  }
}

const shootBtn=document.getElementById("shootBtn");
shootBtn.addEventListener("pointerdown", shoot);

// 🔁 reiniciar universal
const restartBtn=document.getElementById("restartBtn");
restartBtn.addEventListener("pointerdown", restartGame);

function spawnEnemy(){
  if(isGameOver) return;

  enemies.push({
    x:Math.random()*(canvas.width-80),
    y:-80,
    size:80,
    speed:(2+Math.random()*2)*speedMultiplier
  });
}
setInterval(spawnEnemy,1200);

function updateHUD(){
  document.getElementById("hud").innerText=`Puntos: ${score} | ❤️ Vidas: ${lives}`;
}

function loseLife(){
  lives--;
  updateHUD();

  if(lives<=0){
    isGameOver=true;
    document.getElementById("gameOver").style.display="block";
    document.getElementById("finalScore").innerText=`Puntuación: ${score}`;
  }
}

function update(){
  if(isGameOver) return;

  bullets.forEach((b,i)=>{
    b.y-=8;
    if(b.y<0) bullets.splice(i,1);
  });

  enemies.forEach((e,i)=>{
    e.y+=e.speed;

    bullets.forEach((b,bi)=>{
      if(b.x<e.x+e.size && b.x>e.x && b.y<e.y+e.size && b.y>e.y){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        score++;
        updateHUD();

        if(score%15===0) speedMultiplier+=0.3;
      }
    });

    if(e.y>canvas.height){
      enemies.splice(i,1);
      loseLife();
    }
  });

  // 🔥 límite pantalla (universal)
  const margin=30;
  player.x=Math.max(margin, Math.min(canvas.width-margin, player.x));
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawHeart(player.x,player.y,30);

  bullets.forEach(b=>drawHeart(b.x,b.y,12));

  enemies.forEach(e=>drawCircleImage(faceImg,e.x,e.y,e.size));
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();

function restartGame(){
  score=0;
  lives=3;
  bullets=[];
  enemies=[];
  isGameOver=false;
  speedMultiplier=1;

  document.getElementById("gameOver").style.display="none";
  updateHUD();
}

// 🎮 joystick mejorado (pointer events)
const stick=document.getElementById("stick");
const joystick=document.getElementById("joystick");

joystick.addEventListener("pointermove",(e)=>{
  const rect=joystick.getBoundingClientRect();

  let x=e.clientX-rect.left-50;
  let max=40;

  x=Math.max(-max,Math.min(max,x));

  stick.style.left=(x+30)+"px";
  player.x+=x*0.25;
});

joystick.addEventListener("pointerup",()=>{
  stick.style.left="30px";
});

updateHUD();
</script>
</body>
</html>
