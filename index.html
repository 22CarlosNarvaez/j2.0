<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juego pal bebé 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#ffb6c1;
  font-family:Arial;
}

canvas{
  display:block;
  touch-action:none;
}

/* HUD */
#hud{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
}

/* MENSAJE ANIMADO (FIX MOBILE) */
#message{
  position:absolute;
  top:120px;
  width:100%;
  text-align:center;
  font-size:26px;
  color:white;
  opacity:0;
  transform:scale(0.6);
}

#message.show{
  animation: popMsg 0.6s ease forwards;
}

@keyframes popMsg{
  0%{opacity:0; transform:scale(0.6);}
  50%{opacity:1; transform:scale(1.3);}
  100%{opacity:1; transform:scale(1);}
}

/* GAME OVER */
#gameOver{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
  display:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
}

/* CONTROLES */
#joystick{
  position:absolute;
  bottom:30px;
  left:30px;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
}

#stick{
  width:40px;
  height:40px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:30px;
  left:30px;
}

#shootBtn{
  position:absolute;
  bottom:40px;
  right:40px;
  width:70px;
  height:70px;
  background:red;
  border-radius:50%;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="hud">Puntos: 0 | ❤️ Vidas: 3</div>
<div id="message"></div>

<div id="gameOver">
  <div>💔 Game Over</div>
  <div id="finalScore"></div>
  <button id="restartBtn">Reintentar</button>
</div>

<div id="joystick"><div id="stick"></div></div>
<button id="shootBtn">💘</button>

<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// evitar zoom sin romper UI
canvas.style.touchAction="none";

let score=0,lives=3,bullets=[],enemies=[],isGameOver=false;
let speedMultiplier=1;

const player={x:canvas.width/2,y:canvas.height-100};

const faceImg=new Image();
faceImg.src="img/ella.png";

// 💬 MENSAJES
const messages=[
"Eres increíble ❤️",
"Pndja te amo 💕",
"Y vos ser tan linda?:3",
"Hermosaaa<3",

];

// 💬 MOSTRAR MENSAJE (FIX REAL MOBILE)
function showMessage(){
  const msg=messages[Math.floor(Math.random()*messages.length)];
  const el=document.getElementById("message");

  el.innerText=msg;

  el.classList.remove("show");
  void el.offsetWidth; // 🔥 FORZAR REPAINT (CLAVE)

  el.classList.add("show");

  // vibración (si existe)
  if(navigator.vibrate){
    navigator.vibrate(50);
  }

  setTimeout(()=>{
    el.classList.remove("show");
    el.style.opacity=0;
  },2000);
}

// ❤️ CORAZÓN
function drawHeart(x,y,size){
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size/2,x-size,y-size/2,x-size,y);
  ctx.bezierCurveTo(x-size,y+size/2,x,y+size,x,y+size);
  ctx.bezierCurveTo(x,y+size,x+size,y+size/2,x+size,y);
  ctx.bezierCurveTo(x+size,y-size/2,x,y-size/2,x,y);
  ctx.fill();
}

// IMAGEN CIRCULAR
function drawCircle(img,x,y,size){
  ctx.save();
  ctx.beginPath();
  ctx.arc(x+size/2,y+size/2,size/2,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(img,x,y,size,size);
  ctx.restore();
}

// DISPARO
function shoot(){
  if(!isGameOver){
    bullets.push({x:player.x,y:player.y});
  }
}

document.getElementById("shootBtn").addEventListener("pointerdown",shoot);

// REINICIAR
document.getElementById("restartBtn").addEventListener("pointerdown",restartGame);

// ENEMIGOS
function spawnEnemy(){
  if(isGameOver)return;

  enemies.push({
    x:Math.random()*(canvas.width-80),
    y:-80,
    size:80,
    speed:(2+Math.random()*2)*speedMultiplier
  });
}
setInterval(spawnEnemy,1200);

// HUD
function updateHUD(){
  document.getElementById("hud").innerText=`Puntos: ${score} | ❤️ Vidas: ${lives}`;
}

// VIDA
function loseLife(){
  lives--;
  updateHUD();

  if(lives<=0){
    isGameOver=true;
    document.getElementById("gameOver").style.display="block";
    document.getElementById("finalScore").innerText=`Puntuación: ${score}`;
  }
}

// UPDATE
function update(){
  if(isGameOver)return;

  bullets.forEach((b,i)=>{
    b.y-=8;
    if(b.y<0) bullets.splice(i,1);
  });

  enemies.forEach((e,i)=>{
    e.y+=e.speed;

    bullets.forEach((b,bi)=>{
      if(b.x<e.x+e.size && b.x>e.x && b.y<e.y+e.size && b.y>e.y){

        enemies.splice(i,1);
        bullets.splice(bi,1);

        score++;
        updateHUD();

        // 💬 MENSAJE
        if(score%10===0){
          showMessage();
        }

        // ⚡ DIFICULTAD
        if(score%15===0){
          speedMultiplier+=0.3;
        }
      }
    });

    if(e.y>canvas.height){
      enemies.splice(i,1);
      loseLife();
    }
  });

  // 🔒 límite pantalla
  const margin=30;
  player.x=Math.max(margin,Math.min(canvas.width-margin,player.x));
}

// DRAW
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawHeart(player.x,player.y,30);

  bullets.forEach(b=>drawHeart(b.x,b.y,12));

  enemies.forEach(e=>drawCircle(faceImg,e.x,e.y,e.size));
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// RESET
function restartGame(){
  score=0;
  lives=3;
  bullets=[];
  enemies=[];
  isGameOver=false;
  speedMultiplier=1;

  document.getElementById("gameOver").style.display="none";
  updateHUD();
}

// JOYSTICK
const stick = document.getElementById("stick");
const joystick = document.getElementById("joystick");

let isDragging = false;

// cuando toca el joystick
joystick.addEventListener("pointerdown", (e) => {
  isDragging = true;
});

// cuando se mueve
window.addEventListener("pointermove", (e) => {
  if(!isDragging) return;

  const rect = joystick.getBoundingClientRect();

  let x = e.clientX - rect.left - 50;
  let y = e.clientY - rect.top - 50;

  const max = 40;

  // limitar dentro del círculo
  const distance = Math.sqrt(x*x + y*y);
  if(distance > max){
    x = (x / distance) * max;
    y = (y / distance) * max;
  }

  stick.style.left = (x + 30) + "px";
  stick.style.top = (y + 30) + "px";

  // mover jugador (solo eje X)
  player.x += x * 0.15;
});

// cuando suelta (MUY IMPORTANTE)
window.addEventListener("pointerup", () => {
  isDragging = false;

  // regresar al centro
  stick.style.left = "30px";
  stick.style.top = "30px";
});

updateHUD();
</script>

</body>
</html>
